short_bio: >-
  <p>
    I am currently a <strong>Principal Engineer</strong> at <strong>Desay SV Auto.</strong> in Singapore, 
    where I focus on perception model improvements for autonomous driving, including feature detection, 
    tracking, and VLA models for robotics.
  </p>
  <p>
    Previously, I was a <strong>Senior Algorithm Engineer</strong> at <strong>Baidu Tech.</strong> (Beijing), 
    developing computer vision and ML algorithms for autonomous driving — 
    covering 3D object detection, key space detection, and multi-modal scene understanding. 
    Before that, I worked as an <strong>Research Assistant</strong> at <strong>Tsinghua University's 
    Intelligent Transportation Lab</strong>, focusing on radar perception, AIGC-based point cloud 
    enhancement, and clustering algorithms.
  </p>
  <p>
    My research interests span <strong>Machine Learning, Computer Vision, AI4Science, 
    and Large Language Models</strong> and their applications.
  </p>

